<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primer Codespace</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0d1117; /* Fondo oscuro estilo GitHub */
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        
        .card {
            background-color: #161b22;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #30363d;
            border-top: 4px solid #2ea043; /* Verde característico de GitHub */
        }

        h1 {
            margin-top: 0;
        }

        button {
            background-color: #2ea043;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2c974b;
        }

        #contador {
            font-size: 1.5rem;
            font-weight: bold;
            color: #58a6ff; /* Azul de enlaces de GitHub */
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 ¡Hola desde Codespaces!</h1>
        <p>Si estás viendo esto, tu entorno en la nube está funcionando a la perfección.</p>
        <button id="btn-click">Probar JavaScript</button>
        <div id="contador">Clics: 0</div>
    </div>

    <script>
        // Un script muy simple para comprobar la interactividad
        let clics = 0;
        const boton = document.getElementById('btn-click');
        const textoContador = document.getElementById('contador');

        boton.addEventListener('click', () => {
            clics++;
            textoContador.textContent = `Clics: ${clics}`;
            
            // Un pequeño efecto extra
            if (clics === 5) {
                textoContador.textContent += " ¡Vas muy bien!";
                textoContador.style.color = "#f2cc60"; // Amarillo
            }
        });
    </script>
</body>
</html>
