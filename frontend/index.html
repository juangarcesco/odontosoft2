<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Frontend - Backend</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #0f172a; color: white; }
        .card { background: #1e293b; padding: 20px; border-radius: 8px; max-width: 400px; }
        #mensaje { margin-top: 15px; font-weight: bold; color: #38bdf8; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Estado de la API</h2>
        <button id="btn-conectar">Probar Conexión</button>
        <div id="mensaje">Esperando conexión...</div>
    </div>

    <script>
        async function conectarAPI() {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.innerText = "Cargando...";

            try {
                // IMPORTANTE: Pega aquí la URL pública de tu puerto 3000
                const urlBackend = 'PEGA_TU_URL_AQUI/api/health'; 
                
                const respuesta = await fetch(urlBackend);
                const datos = await respuesta.json();
                
                // Mostramos el mensaje en el HTML
                mensajeDiv.innerText = datos.message;
                mensajeDiv.style.color = "#4ade80"; // Verde si funciona
                
            } catch (error) {
                console.error('Error al conectar:', error);
                mensajeDiv.innerText = 'Error: No se pudo conectar al servidor. Revisa que el puerto sea público.';
                mensajeDiv.style.color = "#f87171"; // Rojo si falla
            }
        }

        // Asignamos la función al botón
        document.getElementById('btn-conectar').addEventListener('click', conectarAPI);
    </script>
</body>
</html>
