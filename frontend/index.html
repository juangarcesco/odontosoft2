<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prueba de Antigravity</title>

    <style>

        body {

            margin: 0;

            padding: 0;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;

            background-color: #0f172a;

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            color: white;

            overflow: hidden;

        }



        .container {

            text-align: center;

            z-index: 10;

        }



        h1 {

            font-size: 3rem;

            margin-bottom: 10px;

            text-shadow: 0 0 20px rgba(125, 211, 252, 0.5);

        }



        p {

            font-size: 1.2rem;

            color: #94a3b8;

        }



        /* Cubo que flota desafiando la gravedad */

        .floating-box {

            width: 150px;

            height: 150px;

            background: linear-gradient(135deg, #38bdf8, #818cf8);

            border-radius: 20px;

            margin: 40px auto;

            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.4);

            animation: float 4s ease-in-out infinite;

            transition: background 0.5s ease;

        }



        @keyframes float {

            0% { transform: translateY(0px) rotate(0deg); }

            50% { transform: translateY(-30px) rotate(10deg); }

            100% { transform: translateY(0px) rotate(0deg); }

        }



        /* Pequeñas estrellas de fondo */

        .star {

            position: absolute;

            background-color: white;

            border-radius: 50%;

            opacity: 0.5;

            animation: twinkle 2s infinite alternate;

            z-index: 1;

        }



        @keyframes twinkle {

            from { opacity: 0.2; transform: scale(0.8); }

            to { opacity: 1; transform: scale(1.2); }

        }



        button {

            padding: 12px 24px;

            font-size: 1rem;

            cursor: pointer;

            border: none;

            border-radius: 8px;

            background-color: #38bdf8;

            color: #0f172a;

            font-weight: bold;

            margin-top: 20px;

            transition: transform 0.2s, background-color 0.2s;

        }



        button:hover {

            background-color: #7dd3fc;

            transform: scale(1.05);

        }

    </style>

</head>

<body>



    <div class="container">

        <h1>¡Hola, Antigravity!</h1>

        <p>Este es un documento HTML de prueba con un efecto "antigravedad".</p>

        <div class="floating-box"></div>

        <button id="btn-action">Cambiar color del cubo</button>

    </div>



    <script>

        // Generar algunas "estrellas" de fondo dinámicamente con JavaScript

        for (let i = 0; i < 60; i++) {

            let star = document.createElement('div');

            star.className = 'star';

            // Tamaño aleatorio

            star.style.width = Math.random() * 4 + 'px';

            star.style.height = star.style.width;

            // Posición aleatoria

            star.style.left = Math.random() * 100 + 'vw';

            star.style.top = Math.random() * 100 + 'vh';

            // Retraso de animación para que no parpadeen al mismo tiempo

            star.style.animationDelay = Math.random() * 2 + 's';

            document.body.appendChild(star);

        }



        // Interacción simple: Cambiar el color del cubo al hacer clic

        document.getElementById('btn-action').addEventListener('click', function() {

            const box = document.querySelector('.floating-box');

            // Generar colores hexadecimales aleatorios

            const color1 = Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');

            const color2 = Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');

            

            box.style.background = `linear-gradient(135deg, #${color1}, #${color2})`;

        });

    </script>

</body>

</html>
